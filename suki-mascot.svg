<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 340">
  <defs>
    <!-- Clip visor interior for the horizontal stripes -->
    <clipPath id="vc">
      <path d="M68 70 L212 70 L228 86 L228 200 L212 212 L68 212 L52 200 L52 86Z"/>
    </clipPath>
  </defs>

  <!-- ══ SPARKLES ══════════════════════════════════════════════ -->
  <g id="sparkles" fill="#FF8533">
    <!-- Large 4-pointed star, top-left -->
    <path id="star-tl" d="
      M28 62  L30.2 79.8  L48 82  L30.2 84.2
      L28 102 L25.8 84.2  L8 82   L25.8 79.8 Z
    "/>
    <!-- Small plus, top-right -->
    <rect x="220" y="62"  width="4"  height="14" rx="2"/>
    <rect x="215" y="67"  width="14" height="4"  rx="2"/>
    <!-- Tiny plus, far right -->
    <rect x="234" y="192" width="3"  height="10" rx="1.5"/>
    <rect x="231" y="195" width="10" height="3"  rx="1.5"/>
    <!-- Tiny plus, bottom-left -->
    <rect x="17"  y="218" width="3"  height="10" rx="1.5"/>
    <rect x="14"  y="221" width="10" height="3"  rx="1.5"/>
    <!-- Scattered pixel dots -->
    <rect x="47"  y="52"  width="5" height="5" rx="1"/>
    <rect x="55"  y="62"  width="4" height="4" rx="1"/>
    <rect x="218" y="52"  width="4" height="4" rx="1"/>
    <rect x="226" y="175" width="4" height="4" rx="1"/>
    <rect x="12"  y="210" width="4" height="4" rx="1"/>
  </g>

  <!-- ══ ANTENNA ══════════════════════════════════════════════ -->
  <g id="antenna" fill="#FF8533">
    <!-- Orb (hollow ring look) -->
    <circle cx="140" cy="22" r="12"/>
    <circle cx="140" cy="22" r="7" fill="white"/>
    <!-- Stem -->
    <rect x="137" y="32" width="6"  height="16"/>
    <!-- Base connector -->
    <rect x="128" y="46" width="24" height="8"/>
  </g>

  <!-- ══ HELMET ═══════════════════════════════════════════════ -->
  <g id="helmet">
    <!-- Outer shell (pixel-art octagon) -->
    <path fill="#FF8533" d="
      M60 52  L220 52
      L244 76  L244 196
      L220 220 L60 220
      L36 196  L36 76 Z
    "/>
    <!-- Bow accessory (sitting on top-right of helmet) -->
    <g id="bow" fill="#FF8533">
      <rect x="168" y="34" width="26" height="20" rx="7"/>  <!-- left wing -->
      <rect x="204" y="34" width="26" height="20" rx="7"/>  <!-- right wing -->
      <rect x="190" y="38" width="18" height="12" rx="4"/>  <!-- center knot -->
    </g>
    <!-- Side ear, left -->
    <rect fill="#FF8533" x="21"  y="118" width="17" height="42" rx="5"/>
    <!-- Side ear, right -->
    <rect fill="#FF8533" x="242" y="118" width="17" height="42" rx="5"/>
    <!-- Visor background (white interior) -->
    <path fill="white" d="
      M68 70  L212 70
      L228 86  L228 200
      L212 212 L68 212
      L52 200  L52 86 Z
    "/>
    <!-- Horizontal reflection stripes, clipped to visor -->
    <g clip-path="url(#vc)" fill="#FF8533">
      <rect x="52" y="70"  width="176" height="8"/>
      <rect x="52" y="82"  width="176" height="8"/>
      <rect x="52" y="94"  width="176" height="8"/>
      <rect x="52" y="106" width="176" height="6"/>
    </g>
  </g>

  <!-- ══ FACE ═══════════════════════════════════════════════ -->
  <g id="face" fill="#FF8533">
    <!-- Left eyelashes (4 pixel lashes, tallest in centre) -->
    <rect x="83"  y="112" width="4" height="12"/>
    <rect x="91"  y="108" width="4" height="16"/>
    <rect x="99"  y="110" width="4" height="14"/>
    <rect x="107" y="114" width="4" height="10"/>
    <!-- Right eyelashes -->
    <rect x="167" y="112" width="4" height="12"/>
    <rect x="175" y="108" width="4" height="16"/>
    <rect x="183" y="110" width="4" height="14"/>
    <rect x="191" y="114" width="4" height="10"/>
    <!-- Left eye -->
    <g id="eye-left">
      <rect x="76"  y="122" width="44" height="40" rx="10"/>
      <rect x="81"  y="127" width="16" height="12" fill="white"/>
      <rect x="97"  y="135" width="10" height="10" fill="white"/>
    </g>
    <!-- Right eye -->
    <g id="eye-right">
      <rect x="160" y="122" width="44" height="40" rx="10"/>
      <rect x="165" y="127" width="16" height="12" fill="white"/>
      <rect x="181" y="135" width="10" height="10" fill="white"/>
    </g>
    <!-- Left blush (slightly larger for a softer look) -->
    <rect x="62" y="164" width="14" height="8" rx="3"/>
    <rect x="56" y="171" width="14" height="7" rx="3"/>
    <!-- Right blush -->
    <rect x="204" y="164" width="14" height="8" rx="3"/>
    <rect x="210" y="171" width="14" height="7" rx="3"/>
    <!-- Pixel-art smile (U-shape, 5 rects) -->
    <rect x="116" y="176" width="8"  height="6"/>
    <rect x="124" y="181" width="8"  height="5"/>
    <rect x="132" y="184" width="16" height="5"/>
    <rect x="148" y="181" width="8"  height="5"/>
    <rect x="156" y="176" width="8"  height="6"/>
  </g>

  <!-- ══ BODY ════════════════════════════════════════════════ -->
  <g id="body" fill="#FF8533">
    <!-- Neck connector -->
    <rect x="112" y="220" width="56" height="14"/>
    <!-- Main body (rounded octagon) -->
    <path d="
      M90 232  L190 232
      L212 254  L212 290
      L190 306  L90 306
      L68 290   L68 254 Z
    "/>
    <!-- Pixel-art heart (white so it shows on orange body) -->
    <g id="heart" fill="white">
      <rect x="124" y="254" width="14" height="8"/>
      <rect x="142" y="254" width="14" height="8"/>
      <rect x="120" y="261" width="40" height="8"/>
      <rect x="120" y="268" width="40" height="6"/>
      <rect x="124" y="273" width="32" height="6"/>
      <rect x="128" y="278" width="24" height="6"/>
      <rect x="132" y="283" width="16" height="5"/>
      <rect x="136" y="287" width="8"  height="4"/>
    </g>
  </g>

  <!-- ══ LEFT ARM ═══════════════════════════════════════════ -->
  <g id="arm-left" fill="#FF8533">
    <rect x="42" y="256" width="30" height="22" rx="4"/>
    <circle cx="34" cy="267" r="14"/>
  </g>

  <!-- ══ RIGHT ARM ══════════════════════════════════════════ -->
  <g id="arm-right" fill="#FF8533">
    <!-- Arm curves up slightly -->
    <rect x="208" y="244" width="30" height="22" rx="4" transform="rotate(-15 208 244)"/>
    <circle cx="246" cy="246" r="14"/>
  </g>

  <!-- ══ FEET ════════════════════════════════════════════════ -->
  <g id="feet" fill="#FF8533">
    <rect x="90"  y="298" width="32" height="20" rx="9"/>
    <rect x="158" y="298" width="32" height="20" rx="9"/>
  </g>

</svg>
